kind = "web"
previewPath = "/"
title = "Termos Personalizados"
version = "1.0.0"
id = "artifacts/termos-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20571

[services.development]
run = "pnpm --filter @workspace/termos-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/termos-landing", "run", "build" ]
publicDir = "artifacts/termos-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20571"
BASE_PATH = "/"
