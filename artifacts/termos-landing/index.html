    <!-- Fonts are now self-hosted (see @font-face in index.css) — no third-party
         connection blocks render. Preload only Inter (the body font used across
         the whole page); Cronos Pro (headline only) is left to load with
         font-display:swap so it doesn't compete with the LCP image. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin>

    <!-- Preload the hero carousel's first frame — the LCP element. -->
    <link rel="preload" as="image" href="/galeria/termomate.webp" fetchpriority="high">
