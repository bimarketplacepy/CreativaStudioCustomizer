<!DOCTYPE html>
<html lang="es-PY">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Tag Manager — deferred.
         gtm.js weighs ~113 KB compressed; injected eagerly it competes with the
         entry JS/CSS/LCP image for bandwidth and main thread on mobile. The
         dataLayer starts queueing immediately (no events are lost), but the
         script itself loads on the FIRST of: user interaction (pointer/key/
         scroll) or 3s after window.load. The preconnect warms the connection so
         the eventual fetch is fast. -->
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <script>
    window.dataLayer=window.dataLayer||[];
    window.dataLayer.push({'gtm.start':new Date().getTime(),event:'gtm.js'});
    (function(){
      var done=false;
      function load(){
        if(done)return;done=true;
        var j=document.createElement('script');j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id=GTM-5T5V9NTQ';
        document.head.appendChild(j);
        evs.forEach(function(e){removeEventListener(e,load)});
      }
      var evs=['pointerdown','keydown','scroll','touchstart'];
      evs.forEach(function(e){addEventListener(e,load,{passive:true,once:true})});
      if(document.readyState==='complete'){setTimeout(load,3000);}
      else{addEventListener('load',function(){setTimeout(load,3000)});}
    })();
    </script>
    <!-- End Google Tag Manager -->

    <title>Creativa Studio — Personalización Premium | MarketPlace</title>
    <meta
      name="description"
      content="Termos, vasos, guampas, tablas, cajas, billeteras y más, grabados a medida con láser o impresión a color. Personalice su pieza en nuestro taller dentro de MarketPlace, Avda. España."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Canonical: the SPA fallback answers 200 on ANY path, so without this
         every stray URL indexes as a duplicate of the home. -->
    <link rel="canonical" href="https://creativastudiopy.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_PY" />
    <meta property="og:site_name" content="Creativa Studio" />
    <meta property="og:title" content="Creativa Studio — Personalización Premium" />
    <meta
      property="og:description"
      content="Personalice su pieza exclusiva: termos, vasos, guampas, tablas, cajas y más, grabados a medida."
    />
    <meta property="og:url" content="https://creativastudiopy.com/" />
    <!-- Absolute URL: WhatsApp and several scrapers ignore relative og:image. -->
    <meta property="og:image" content="https://creativastudiopy.com/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Structured data: physical shop inside MarketPlace -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Creativa Studio",
      "description": "Taller de personalización premium: termos, vasos, guampas, tablas, cajas, billeteras y más, grabados a medida con láser o impresión a color.",
      "url": "https://creativastudiopy.com/",
      "image": "https://creativastudiopy.com/opengraph.jpg",
      "telephone": "+595971300945",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "MarketPlace, Avda. España",
        "addressCountry": "PY"
      },
      "sameAs": ["https://www.instagram.com/creativastudio.py"]
    }
    </script>

    <!-- Fonts are now self-hosted (see @font-face in index.css) — no third-party
         connection blocks render. Preload only Inter (the body font used across
         the whole page); Cronos Pro (headline only) is left to load with
         font-display:swap so it doesn't compete with the LCP image. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin>

    <!-- Preload the hero carousel's first frame — the LCP element.
         imagesrcset/imagesizes must stay identical to the <img> in
         hero-carousel.tsx (CAROUSEL_SIZES) so the preloaded variant is the one
         actually rendered — otherwise the preload is wasted. On mobile this
         fetches the lighter 700px file; retina/desktop gets the 900px. -->
    <link
      rel="preload"
      as="image"
      href="/galeria/termomate.webp"
      imagesrcset="/galeria/termomate-700.webp 700w, /galeria/termomate.webp 900w"
      imagesizes="(min-width: 1024px) 512px, calc(100vw - 3rem)"
      fetchpriority="high"
    >
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5T5V9NTQ"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
